services:
  db:
    platform: linux/amd64
    image: pgvector/pgvector:pg16
    container_name: travel_db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: travel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d travel"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: